name: Update Data & Rebuild Matrices

on:
  schedule:
    - cron: "0 21 * * *"   # 台灣時間每天早上 05:00
  workflow_dispatch:         # 允許手動觸發

permissions:
  contents: write

concurrency:
  group: update-and-build
  cancel-in-progress: true

jobs:
  update-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pyarrow numpy

      # Step 1: 下載最新價格
      - name: Update price data
        run: python update.py

      # Step 2: 立刻重建 calendar（不需要偵測 diff，每次都跑）
      - name: Rebuild matrices (US + TW)
        run: python build_matrix.py

      # Step 3: 把所有變更一次 commit push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update [skip ci]"
            git push
          fi
